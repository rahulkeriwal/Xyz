<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting</title>

  <style>
    body {
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      padding-top: 100px;
      padding-bottom: 120px;
    }

    .header-ad,
    .footer-ad {
      position: fixed;
      width: 100%;
      text-align: center;
      background: black;
      z-index: 9999;
    }

    .header-ad {
      top: 0;
      height: 90px;
    }

    .footer-ad {
      bottom: 0;
      padding: 10px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .inline-ad {
      margin-bottom: 20px;
      text-align: center;
    }

    .continue-button,
    .telegram-button {
      background: yellow;
      color: black;
      font-size: 6vw;
      font-weight: bold;
      padding: 4vw 8vw;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px yellow;
      display: flex;
      align-items: center;
      gap: 3vw;
      margin-top: 20px;
      animation: blink 1.2s infinite;
    }

    .continue-button img,
    .telegram-button img {
      height: 6vw;
      width: auto;
    }

    @keyframes blink {
      0%,100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.7);
      }
    }
  </style>
</head>

  <!-- Top Ad -->
  <div class="header-ad">
